<!DOCTYPE html>
<html>
<body>
    <script src="https://pixijs.download/v8.1.0/pixi.js"></script>
    <script>
        async function run() {
            const app = new PIXI.Application();
            await app.init({ width: 800, height: 600 });
            document.body.appendChild(app.canvas);

            try {
                // Testing PIXI.Texture.from with a fetch
                const img = new Image();
                img.src = '/assets/patterns/pattern_0.png';
                await new Promise(r => img.onload = r);
                const texture = PIXI.Texture.from(img);

                const tiling = new PIXI.TilingSprite({
                    texture,
                    width: 800,
                    height: 600
                });
                app.stage.addChild(tiling);
                console.log('ADDED_TILING_SPRITE_FROM');
            } catch (e) {
                console.error(e);
            }
        }
        run();
    </script>
</body>
</html>
