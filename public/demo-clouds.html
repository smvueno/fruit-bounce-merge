<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParticleContainer Cloud Loop Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        #hud {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.85); color: #fff; padding: 12px 16px;
            border-radius: 8px; font-family: monospace; font-size: 13px;
            line-height: 1.8;
        }
        #hud .row { display: flex; justify-content: space-between; gap: 20px; }
        .label { color: #94a3b8; }
        .value { color: #4ade80; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.85); color: #fff;
            padding: 12px 20px; border-radius: 8px; font-family: monospace;
            display: flex; gap: 10px; align-items: center;
        }
        #controls label { color: #94a3b8; font-size: 12px; }
        #controls input { width: 80px; background: #1a1a2e; color: #fbbf24; border: 1px solid #333; padding: 4px 8px; border-radius: 4px; font-family: monospace; }
        #controls button { background: #3b82f6; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: monospace; }
        #controls button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="row"><span class="label">Technique:</span><span class="value">ParticleContainer</span></div>
        <div class="row"><span class="label">Clouds:</span><span class="value" id="count">50</span></div>
        <div class="row"><span class="label">FPS:</span><span class="value" id="fps">-</span></div>
    </div>

    <div id="controls">
        <label>Clouds:</label>
        <input type="number" id="cloudCount" value="50" min="1" max="5000">
        <button onclick="rebuild()">Rebuild</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <script>
        let app, pc, cloudTextures = [], particles = [];

        async function init() {
            app = new PIXI.Application();
            await app.init({
                width: window.innerWidth,
                height: window.innerHeight,
                backgroundColor: 0x1a1a2e,
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true,
            });
            document.body.appendChild(app.canvas);

            window.addEventListener('resize', () => {
                app.renderer.resize(window.innerWidth, window.innerHeight);
                rebuild();
            });

            // Create cloud textures — 3-ball and 2-ball variants
            const cloud3 = new PIXI.Graphics();
            cloud3.circle(0, -20, 20);
            cloud3.circle(30, -30, 28);
            cloud3.circle(60, -20, 20);
            cloud3.fill({ color: 0xFFFFFF });
            const texture3 = app.renderer.generateTexture({ target: cloud3, resolution: 4, antialias: true });
            cloud3.destroy();

            const cloud2 = new PIXI.Graphics();
            cloud2.circle(0, -15, 18);
            cloud2.circle(28, -25, 24);
            cloud2.fill({ color: 0xFFFFFF });
            const texture2 = app.renderer.generateTexture({ target: cloud2, resolution: 4, antialias: true });
            cloud2.destroy();

            cloudTextures = [texture3, texture2];

            // ParticleContainer
            pc = new PIXI.ParticleContainer({
                dynamicProperties: { position: true, scale: false, rotation: false, color: false },
            });
            app.stage.addChild(pc);

            buildClouds(50);

            // FPS counter
            let frames = 0, lastTime = performance.now();
            app.ticker.add(() => {
                frames++;
                const now = performance.now();
                if (now - lastTime >= 500) {
                    document.getElementById('fps').textContent = ((frames * 1000) / (now - lastTime)).toFixed(1);
                    frames = 0;
                    lastTime = now;
                }

                const vw = app.screen.width;
                for (const p of particles) {
                    p.x += p.userData.speed;
                    if (p.x > vw + 100) p.x = -100; // Loop back to left
                }
            });
        }

        function buildClouds(count) {
            // Clear
            while (pc.numParticles > 0) {
                pc.removeParticle(0);
            }
            particles = [];

            const vw = app.screen.width;
            const vh = app.screen.height;

            // Depth layers: 0=far (small, slow, dim), 1=mid, 2=near (big, fast, bright)
            // Speeds halved for gentle, natural drift
            const layers = [
                { scale: 0.4, alpha: 0.2, speed: 0.5, yRange: [0.05, 0.15], texIdx: 1 },  // far - 2-ball
                { scale: 0.7, alpha: 0.35, speed: 1.0, yRange: [0.08, 0.20], texIdx: 0 },  // mid - 3-ball
                { scale: 1.2, alpha: 0.55, speed: 1.5, yRange: [0.12, 0.25], texIdx: 0 },  // near - 3-ball
            ];

            for (let i = 0; i < count; i++) {
                // Pick a depth layer (weighted toward mid/far for natural look)
                const r = Math.random();
                const layer = r < 0.35 ? layers[0] : r < 0.7 ? layers[1] : layers[2];

                // Add some variation within the layer
                const scaleVar = layer.scale * (0.8 + Math.random() * 0.4);
                const speedVar = layer.speed * (0.7 + Math.random() * 0.6);
                const alphaVar = layer.alpha * (0.8 + Math.random() * 0.4);
                const yMin = vh * layer.yRange[0];
                const yMax = vh * layer.yRange[1];

                const tex = cloudTextures[layer.texIdx];
                const p = new PIXI.Particle(tex);
                p.x = Math.random() * (vw + 300) - 150;
                p.y = yMin + Math.random() * (yMax - yMin);
                p.alpha = alphaVar;
                p.scaleX = scaleVar;
                p.scaleY = scaleVar;
                p.userData = { speed: speedVar };
                particles.push(p);
                pc.addParticle(p);
            }

            document.getElementById('count').textContent = count;
            document.getElementById('cloudCount').value = count;
        }

        function rebuild() {
            const count = parseInt(document.getElementById('cloudCount').value) || 50;
            buildClouds(Math.min(5000, Math.max(1, count)));
        }

        init();
    </script>
</body>
</html>
