<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixiJS v8 Tiling Sprite Debug</title>
    <script src="https://pixijs.download/v8.0.0/pixi.js"></script>
    <style>
        body { margin: 0; background: #fff; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        (async () => {
            const app = new PIXI.Application();
            await app.init({ width: 800, height: 600, backgroundColor: 0xFFF8E1 });
            document.body.appendChild(app.canvas);

            // Container to match game setup
            const container = new PIXI.Container();
            app.stage.addChild(container);

            // Load texture
            const texture = await PIXI.Assets.load('../public/assets/patterns/pattern_0.png');
            console.log('Texture loaded:', texture.width, texture.height);
            texture.source.scaleMode = 'linear';

            // Create tiling sprite
            const tilingSprite = new PIXI.TilingSprite({
                texture: texture,
                width: 800,
                height: 600
            });

            // Set scale and alpha to test visibility
            tilingSprite.tileScale.set(80 / 100);
            tilingSprite.alpha = 1.0;

            container.addChild(tilingSprite);

            // Gradient mask
            const gradCanvas = document.createElement('canvas');
            gradCanvas.width = 1;
            gradCanvas.height = 256;
            const ctx = gradCanvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 256);
            gradient.addColorStop(0, 'rgba(255,255,255,0.9)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0)');
            gradient.addColorStop(0.8, 'rgba(255,255,255,0)');
            gradient.addColorStop(1, 'rgba(255,255,255,0.9)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1, 256);

            const gradTexture = PIXI.Texture.from(gradCanvas);
            const gradientSprite = new PIXI.Sprite(gradTexture);
            gradientSprite.width = 800;
            gradientSprite.height = 600;
            container.addChild(gradientSprite);

            app.ticker.add(() => {
                tilingSprite.tilePosition.x -= 1;
            });
        })();
    </script>
</body>
</html>
